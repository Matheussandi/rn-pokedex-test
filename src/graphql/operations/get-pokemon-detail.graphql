query GetPokemonDetail($id: Int!) {
  pokemon(where: { id: { _eq: $id } }) {
    id
    name
    height
    weight
    base_experience
    order
    is_default
    pokemontypes {
      type {
        name
      }
    }
    pokemonabilities {
      ability {
        name
      }
      is_hidden
    }
    pokemonstats {
      base_stat
      effort
      stat {
        name
      }
    }
    pokemonspecy {
      capture_rate
      is_legendary
      is_mythical
      flavor_pt: pokemonspeciesflavortexts(
        limit: 1
        where: { language: { name: { _eq: "pt" } } }
      ) {
        flavor_text
      }
      flavor_en: pokemonspeciesflavortexts(
        limit: 1
        where: { language: { name: { _eq: "en" } } }
      ) {
        flavor_text
      }
    }
    pokemonsprites {
      sprites
    }
  }
}
